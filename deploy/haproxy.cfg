global
    maxconn 4096
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 60s
    timeout server 60s
    timeout tunnel 3600s

# ── Stats ──
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

# ── HTTP → HTTPS redirect (production) ──
frontend http_front
    bind *:80
    # In production with SSL:
    # redirect scheme https code 301 if !{ ssl_fc }
    # For Cloudflare Tunnel (already terminates SSL):
    use_backend api_back if { path_beg /api/ }
    use_backend api_back if { path_beg /health }
    use_backend ws_back if { path_beg /api/v1/talk/ws/ }
    use_backend docs_back if { path_beg /docs }
    use_backend docs_back if { path_beg /redoc }
    use_backend docs_back if { path_beg /openapi.json }
    default_backend frontend_back

# ── HTTPS (if using local certs, not Cloudflare Tunnel) ──
# frontend https_front
#     bind *:443 ssl crt /etc/haproxy/certs/combined.pem
#     http-request set-header X-Forwarded-Proto https
#     use_backend api_back if { path_beg /api/ }
#     use_backend ws_back if { path_beg /api/v1/talk/ws/ }
#     default_backend frontend_back

# ── Backend: FastAPI ──
backend api_back
    option httpchk GET /health
    http-check expect status 200
    server api1 api:8000 check inter 10s fall 3 rise 2

# ── Backend: WebSocket (long timeout) ──
backend ws_back
    timeout server 3600s
    timeout tunnel 3600s
    server ws1 api:8000 check inter 30s

# ── Backend: Swagger docs ──
backend docs_back
    server docs1 api:8000

# ── Frontend: Next.js ──
backend frontend_back
    option httpchk GET /
    http-check expect status 200
    server fe1 frontend:3000 check inter 10s fall 3 rise 2
